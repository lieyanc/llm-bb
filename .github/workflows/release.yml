name: CI, OTA, and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  VERSION_PKG: llm-bb/internal/version

jobs:
  meta:
    name: Build Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      commit: ${{ steps.meta.outputs.commit }}
      build_date: ${{ steps.meta.outputs.build_date }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - name: Resolve version metadata
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          CHANNEL="dev"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            CHANNEL="stable"
          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            DATE="$(date -u +'%Y%m%d')"
            RUN_NUM="$(printf '%04d' "${GITHUB_RUN_NUMBER}")"
            VERSION="dev-${RUN_NUM}-${DATE}-${SHORT_SHA}"
          else
            VERSION="pr-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run typecheck:ui

      - name: Build embedded frontend
        run: npm run build:ui

      - name: Run Go tests
        run: go test ./...

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs:
      - meta
      - test
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
            archive_ext: .tar.gz
          - target: linux-arm64
            goos: linux
            goarch: arm64
            ext: ''
            archive_ext: .tar.gz
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ''
            archive_ext: .tar.gz
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ''
            archive_ext: .tar.gz
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
            archive_ext: .zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build embedded frontend
        run: npm run build:ui

      - name: Build binary and package
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.meta.outputs.version }}
          COMMIT: ${{ needs.meta.outputs.commit }}
          CHANNEL: ${{ needs.meta.outputs.channel }}
          BUILD_DATE: ${{ needs.meta.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist

          target="${{ matrix.target }}"
          bin="llm-bb-${target}${{ matrix.ext }}"
          package_dir="llm-bb-${VERSION}-${target}"
          archive="llm-bb-${target}${{ matrix.archive_ext }}"

          ldflags="-s -w"
          ldflags="${ldflags} -X ${VERSION_PKG}.Version=${VERSION}"
          ldflags="${ldflags} -X ${VERSION_PKG}.Commit=${COMMIT}"
          ldflags="${ldflags} -X ${VERSION_PKG}.Channel=${CHANNEL}"
          ldflags="${ldflags} -X ${VERSION_PKG}.BuildDate=${BUILD_DATE}"

          go build -trimpath -ldflags="${ldflags}" -o "dist/${bin}" ./cmd/llm-bb

          (
            cd dist
            sha256sum "${bin}" > "${bin}.sha256"
          )

          mkdir -p "dist/${package_dir}"
          cp "dist/${bin}" "dist/${package_dir}/llm-bb${{ matrix.ext }}"
          cp README.md LICENSE "dist/${package_dir}/"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            (
              cd dist
              zip -r "${archive}" "${package_dir}"
              sha256sum "${archive}" > "${archive}.sha256"
            )
          else
            tar -C dist -czf "dist/${archive}" "${package_dir}"
            (
              cd dist
              sha256sum "${archive}" > "${archive}.sha256"
            )
          fi

          rm -rf "dist/${package_dir}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-bb-${{ matrix.target }}
          path: |
            dist/llm-bb-${{ matrix.target }}${{ matrix.ext }}
            dist/llm-bb-${{ matrix.target }}${{ matrix.ext }}.sha256
            dist/llm-bb-${{ matrix.target }}${{ matrix.archive_ext }}
            dist/llm-bb-${{ matrix.target }}${{ matrix.archive_ext }}.sha256
          if-no-files-found: error
          retention-days: 3

  release-dev:
    name: Publish Dev OTA Release
    runs-on: ubuntu-latest
    needs:
      - meta
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: llm-bb-*
          path: release
          merge-multiple: true

      - name: Add version metadata
        run: |
          set -euo pipefail
          cat > release/version.json <<EOF
          {
            "version": "${{ needs.meta.outputs.version }}",
            "commit": "${{ needs.meta.outputs.commit }}",
            "build_date": "${{ needs.meta.outputs.build_date }}",
            "channel": "dev",
            "tag": "dev"
          }
          EOF

      - name: Refresh dev tag and prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete dev --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag || true
          git tag -f dev "${GITHUB_SHA}"
          git push --force origin refs/tags/dev
          gh release create dev release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Dev Build #${GITHUB_RUN_NUMBER} (${{ needs.meta.outputs.commit }})" \
            --notes "Dev build for ${GITHUB_SHA}" \
            --prerelease \
            --target "${GITHUB_SHA}" \
            --latest=false

  release-stable:
    name: Publish Stable Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: llm-bb-*
          path: release
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: release/*

  cleanup-artifacts:
    name: Clean Up Old Artifacts
    needs:
      - build
      - release-dev
      - release-stable
    if: ${{ always() && !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete artifacts from previous runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 },
            );

            for (const artifact of artifacts) {
              if (artifact.workflow_run?.id === context.runId) continue;
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
