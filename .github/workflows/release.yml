name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build:ui

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -eu
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          BASE="llm-bb-${VERSION}-${GOOS}-${GOARCH}"
          OUT="dist/${BASE}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$OUT" ./cmd/llm-bb
          cd dist
          if [ "${GOOS}" = "windows" ]; then
            zip "${BASE}.zip" "${BASE}${{ matrix.ext }}"
            rm "${BASE}${{ matrix.ext }}"
          else
            tar -czf "${BASE}.tar.gz" "${BASE}"
            rm "${BASE}"
          fi
          sha256sum "${BASE}".* > "${BASE}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: llm-bb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release-dev:
    name: Release dev
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Reset dev release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --cleanup-tag --yes 2>/dev/null || true

      - name: Create dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Development Build"
          prerelease: true
          target_commitish: ${{ github.sha }}
          body: |
            Automated development build from `master` at `${{ github.sha }}`.

            **Not for production use.** This tag is force-updated on every push to `master`.
          files: dist/*
          fail_on_unmatched_files: true

  release-tag:
    name: Release tagged version
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
