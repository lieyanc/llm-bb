{{define "error"}}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{{.Status}} - llm-bb</title>
  <link rel="stylesheet" href="/static/index.css">
</head>
<body class="min-h-screen bg-background text-foreground antialiased">
  <main class="container flex min-h-screen items-center justify-center py-10">
    <article class="w-full max-w-xl rounded-lg border border-border bg-card p-6">
      <p class="font-mono text-xs uppercase tracking-wider text-muted-foreground">HTTP {{.Status}}</p>
      <h1 class="mt-2 text-2xl font-semibold">请求失败</h1>
      <p class="mt-3 text-sm leading-relaxed text-muted-foreground">{{.Error}}</p>
      <div class="mt-5 flex flex-wrap gap-2">
        <a class="inline-flex items-center rounded-lg bg-primary px-4 py-2 text-sm font-medium text-primary-foreground" href="/">返回</a>
        <a class="inline-flex items-center rounded-lg border border-border bg-card px-4 py-2 text-sm font-medium text-foreground" href="/admin">导演台</a>
      </div>
    </article>
  </main>
</body>
</html>
{{end}}
