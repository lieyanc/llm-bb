{{define "error"}}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{{.Status}} - llm-bb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen bg-background text-foreground antialiased">
  <main class="container flex min-h-screen items-center justify-center py-10">
    <article class="w-full max-w-2xl rounded-[2rem] border border-border/70 bg-card/90 p-8 shadow-panel backdrop-blur">
      <p class="font-mono text-xs uppercase tracking-[0.35em] text-primary">HTTP {{.Status}}</p>
      <h1 class="mt-4 font-display text-4xl font-semibold tracking-[-0.06em] text-foreground sm:text-5xl">请求没有完成</h1>
      <p class="mt-5 max-w-2xl text-base leading-8 text-muted-foreground">{{.Error}}</p>
      <div class="mt-8 flex flex-wrap gap-3">
        <a class="inline-flex items-center rounded-full bg-primary px-5 py-2.5 text-sm font-medium text-primary-foreground shadow-float transition hover:translate-y-[-1px]" href="/">返回首页</a>
        <a class="inline-flex items-center rounded-full border border-border bg-background/70 px-5 py-2.5 text-sm font-medium text-foreground transition hover:bg-accent/60" href="/admin">打开导演台</a>
      </div>
    </article>
  </main>
</body>
</html>
{{end}}
